[keyboard]
name = "VFLK"
product_name = "VFLK Keyboard"
vendor_id = 0xFEED
product_id = 0x9527
manufacturer = "kaumovich"
chip = "nrf52840"
usb_enable = true

[split]
connection = "ble"

[storage]
enabled = true
clear_storage = true


[layout]
rows = 6
cols = 13
layers = 1
keymap = [
    [
        ["Escape",    "F1",   "F2",     "F3",    "F4",    "F5",         "F6",       "No",   "Kc7",   "Kc8",   "Kc9",     "Kc0",       "Minus"          ],
        ["No",        "Kc1",  "Kc2",    "Kc3",   "Kc4",   "Kc5",        "Kc6",      "No",   "Kc7",   "Kc8",   "Kc9",     "Kc0",       "Minus"          ],
        ["Tab",       "Q",    "W",      "E",     "R",     "T",          "Y",        "No",   "U",     "I",     "O",       "P",         "LeftBracket"    ],
        ["CapsLock",  "A",    "S",      "D",     "F",     "G",          "No",       "H",    "J",     "K",     "L",       "Semicolon", "Quote",         ],
        ["LShift",    "Z",    "X",      "C",     "V",     "B",          "No",       "N",    "M",     "Comma", "Dot",     "Slash",     "RShift",        ],
        ["LCtrl",     "LGui", "MO(1)",  "LAlt",  "Space", "No",         "No",       "No",   "MO(2)", "No",    "PageUp",  "Home",      "Left",          ],    
